name: SwiftNZB

settings:
  DEVELOPMENT_TEAM: 68BLC88PQ9

# Local Swift packages live in-repo under Packages/ (their sources ARE committed — see
# .gitignore, which deliberately does NOT ignore Packages/). The remote Unrar dependency is
# added when extraction is wired (Phase 2). Until a package exists, leave it out so every
# `xcodegen generate` + build stays green.
packages:
  DownloadEngine:
    path: Packages/DownloadEngine
  PAR2Kit:
    path: Packages/PAR2Kit

targets:
  SwiftNZB:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: 26.0
    sources:
      - path: SwiftNZB
      - path: Localizable.xcstrings
        buildPhase: resources
    scheme: {}
    dependencies:
      - target: SwiftNZBWidgets
      - package: DownloadEngine
      - package: PAR2Kit
    settings:
      base:
        # iPhone + iPad. The UI is size-class adaptive (TabView on compact,
        # NavigationSplitView on regular width).
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: SwiftNZB
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: SwiftNZB
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_FILE: SwiftNZB/Info.plist
        CODE_SIGN_ENTITLEMENTS: SwiftNZB/Entitlements.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: de.valentinlehmann.swiftnzb
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: 1
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PROVISIONING_PROFILE_SPECIFIER: ""
        IPHONEOS_DEPLOYMENT_TARGET: 26.0
        CODE_SIGN_IDENTITY: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
      configs:
        Debug:
          # SWIFTNZB_APP gates app-only code in source files shared with the widget
          # (e.g. DownloadManager calls inside the Live Activity intents).
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG SWIFTNZB_APP"
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "iPhone Developer"
          "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match Development de.valentinlehmann.swiftnzb"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "SWIFTNZB_APP"
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "iPhone Distribution"
          "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match AppStore de.valentinlehmann.swiftnzb"

  SwiftNZBWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: 26.0
    sources:
      - path: SwiftNZBWidgets
      # Shared with the app. The attributes file must stay dependency-free; the intents file
      # gates its DownloadManager calls behind SWIFTNZB_APP (app target only).
      - path: SwiftNZB/Types/DownloadActivityAttributes.swift
      - path: SwiftNZB/Intents/DownloadIntents.swift
    settings:
      base:
        # Live Activities are meaningful on iPad too, so the widget is universal.
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: SwiftNZBWidgets
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: SwiftNZBWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: de.valentinlehmann.swiftnzb.widgets
        IPHONEOS_DEPLOYMENT_TARGET: 26.0
        PROVISIONING_PROFILE_SPECIFIER: ""
        CODE_SIGN_IDENTITY: ""
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "iPhone Developer"
          "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match Development de.valentinlehmann.swiftnzb.widgets"
        Release:
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "iPhone Distribution"
          "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match AppStore de.valentinlehmann.swiftnzb.widgets"
